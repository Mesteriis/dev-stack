name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Build app bundles
        run: make app
